<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Fond -->
  <rect width="100" height="100" fill="#080C12"/>

  <!--
    Coordonnées exactes du logo v2, recentrées :
    Original : icon dans viewBox 0 0 420 100, cx=50 cy=50
    → on garde le même repère, juste on affiche uniquement l'icône (0 0 100 100)
  -->

  <!-- Hex gauche haut -->
  <polygon points="28,5 46,16 46,38 28,49 10,38 10,16"
    fill="#0A1628" stroke="#3B82F6" stroke-width="2"/>

  <!-- Hex gauche bas -->
  <polygon points="28,51 46,62 46,84 28,95 10,84 10,62"
    fill="#0A1628" stroke="#3B82F6" stroke-width="2"/>

  <!-- Hex droit haut -->
  <polygon points="72,5 90,16 90,38 72,49 54,38 54,16"
    fill="#0A1628" stroke="#3B82F6" stroke-width="2"/>

  <!-- Hex droit bas -->
  <polygon points="72,51 90,62 90,84 72,95 54,84 54,62"
    fill="#0A1628" stroke="#3B82F6" stroke-width="2"/>

  <!-- Barre centrale -->
  <rect x="38" y="42" width="24" height="16" rx="2"
    fill="#0A1628" stroke="#3B82F6" stroke-width="1.8"/>

  <!-- Roue k8s — cx=50 cy=50 identique au logo v2 -->
  <circle cx="50" cy="50" r="6"   fill="#1E3A8A" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="3.2" fill="#3B82F6"/>
  <circle cx="50" cy="50" r="1.1" fill="#080C12"/>

  <!-- 6 spokes — identiques au logo v2 -->
  <line x1="50"   y1="41.5" x2="50"   y2="35"   stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="55.6" y1="44.7" x2="61"   y2="39.1" stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="55.8" y1="55.3" x2="61.2" y2="60.9" stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="50"   y1="58.5" x2="50"   y2="65"   stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="44.2" y1="55.3" x2="38.8" y2="60.9" stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="44.4" y1="44.7" x2="39"   y2="39.1" stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round"/>

  <!-- 6 blade tips — identiques au logo v2 -->
  <circle cx="50"   cy="33.5" r="2.5" fill="white"/>
  <circle cx="62.2" cy="38.4" r="2.5" fill="white"/>
  <circle cx="62.5" cy="61.6" r="2.5" fill="white"/>
  <circle cx="50"   cy="66.5" r="2.5" fill="white"/>
  <circle cx="37.5" cy="61.6" r="2.5" fill="white"/>
  <circle cx="37.8" cy="38.4" r="2.5" fill="white"/>

</svg>
