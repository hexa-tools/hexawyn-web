comment:
  layout: "reach, diff, flags, components"
  require_changes: false

coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 2%
    patch:
      default:
        target: 95%

component_management:
  individual_components:
    - component_id: app
      name: App (routing & pages)
      paths:
        - app/**
    - component_id: components
      name: Components (UI)
      paths:
        - components/**
    - component_id: lib
      name: Lib (content & domain)
      paths:
        - lib/**

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "app/**/layout.tsx"
  - "vitest.config.ts"
  - "vitest.setup.ts"
  - "next.config.ts"
  - "tailwind.config.ts"
  - "postcss.config.mjs"
